tools:

  # =====================================================
  # USER INTERACTION
  # =====================================================

  - name: clarify
    description: >
      Ask the user for missing information ONLY when the task
      cannot be completed safely or accurately without it.

      Never use clarify if a reasonable assumption can be made.

      Examples:
      - Missing recipient before sending
      - Missing URL to fetch
      - Ambiguous company/person with multiple likely matches

    parameters:
      type: object
      properties:
        question:
          type: string
          description: Question shown to user

        response_type:
          type: string
          enum: [text, yes_no, choice]
          default: text

        options:
          type: array
          items:
            type: string
          default: []

      required:
        - question


  # =====================================================
  # SOCIAL / X
  # =====================================================

  - name: timeline
    description: >
      Retrieve recent posts from a specific social account.

      Use when:
      - user asks what someone posted
      - user asks for recent tweets/posts from an account
      - user wants account activity summary

      Do NOT use for keyword search.

    parameters:
      type: object
      properties:
        screenname:
          type: string
          description: Account handle without @

        limit:
          type: integer
          default: 10
          minimum: 1
          maximum: 100

      required:
        - screenname


  - name: social_search
    description: >
      Search public social media posts.

      Use when:
      - user asks what people are saying
      - user asks sentiment/community reaction
      - user asks trending discussion

      search_type:
      - Latest = newest posts
      - Top = most relevant/high engagement

    parameters:
      type: object
      properties:
        query:
          type: string

        search_type:
          type: string
          enum:
            - Latest
            - Top
          default: Top

        limit:
          type: integer
          default: 10
          minimum: 1
          maximum: 100

      required:
        - query


  # =====================================================
  # WEB SEARCH
  # =====================================================

  - name: lookup
    description: >
      Search the web.

      Preferred tool for:
      - news
      - current events
      - company information
      - product information
      - factual research

      topic:
      - news = recent events
      - general = evergreen knowledge

      timeframe:
      - day = today / last 24h
      - week = last 7 days
      - month = last 30 days
      - year = last 12 months

    parameters:
      type: object
      properties:
        query:
          type: string

        topic:
          type: string
          enum:
            - general
            - news
          default: general

        timeframe:
          type: string
          enum:
            - day
            - week
            - month
            - year
          default: month

        max_results:
          type: integer
          default: 10
          minimum: 1
          maximum: 50

      required:
        - query


  - name: fetch
    description: >
      Retrieve and read content from a specific URL.

      Use only when:
      - user supplies a URL
      - a search result URL needs deeper inspection

      Do not use for general search.

    parameters:
      type: object
      properties:
        url:
          type: string

      required:
        - url


  # =====================================================
  # FORMATTING
  # =====================================================

  - name: format
    description: >
      Convert collected information into a structured output.

      Templates:

      brief:
        short summary

      bullets:
        bullet list

      sections:
        grouped report

      thread:
        social media thread

      daily_ai_vn:
        Vietnamese AI news digest

    parameters:
      type: object
      properties:

        items:
          type: array
          items:
            type: object
            properties:
              title:
                type: string

              url:
                type: string

              source:
                type: string

              summary:
                type: string

              section:
                type: string

        template:
          type: string
          enum:
            - brief
            - sections
            - bullets
            - thread
            - daily_ai_vn
          default: sections

        headline:
          type: string

      required:
        - items
        - template


  # =====================================================
  # SEND / PUBLISH
  # =====================================================

  - name: send
    description: >
      Publish, send, email, post, submit, or transmit content.

      IMPORTANT:
      Never call this tool unless the user has explicitly
      confirmed they want the content sent.

      Examples requiring confirmation:
      - Send email
      - Publish tweet
      - Post article
      - Submit report

      If user only asks to draft content,
      do NOT use send.

    parameters:
      type: object
      properties:

        text:
          type: string

        confirmed:
          type: boolean
          description: Must be true

      required:
        - text
        - confirmed


  # =====================================================
  # POLICY SEARCH
  # =====================================================

  - name: policy
    description: >
      Search internal policies and operating procedures.

      Use when:
      - user asks policy questions
      - tool behavior is unclear
      - publishing/privacy questions arise

    parameters:
      type: object
      properties:

        query:
          type: string

        policy_area:
          type: string
          enum:
            - all
            - ai_research
            - source_citation
            - data_privacy
            - external_publishing
            - tool_usage
          default: all

        top_k:
          type: integer
          default: 5

      required:
        - query


  # =====================================================
  # RESEARCH PAPERS
  # =====================================================

  - name: papers
    description: >
      Search academic papers.

      Preferred for:
      - research surveys
      - literature review
      - finding papers

    parameters:
      type: object
      properties:

        query:
          type: string

        max_results:
          type: integer
          default: 10

        sort_by:
          type: string
          enum:
            - relevance
            - submittedDate
            - lastUpdatedDate
          default: relevance

      required:
        - query


  - name: paper_text
    description: >
      Retrieve text from an academic paper.

      Input may be:
      - arXiv URL
      - arXiv ID

      Use after papers search when deeper reading is required.

    parameters:
      type: object
      properties:

        arxiv_url:
          type: string

        max_pages:
          type: integer
          default: 10

        max_chars:
          type: integer
          default: 12000

      required:
        - arxiv_url